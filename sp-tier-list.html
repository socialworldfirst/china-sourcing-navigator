<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF Selling Points — Tier List</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', system-ui, sans-serif;
  background: #0f0a1a;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 24px;
}

h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #69727D; margin-bottom: 24px; }

.controls {
  display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 50; background: #0f0a1a; padding: 12px 0;
}

.btn {
  padding: 10px 20px; font-size: 13px; font-weight: 600;
  font-family: 'Poppins', sans-serif; border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: #FF0051; color: #fff; }
.btn-primary:hover { background: #E0004A; }
.btn-secondary { background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.12); }
.btn-secondary:hover { background: rgba(255,255,255,0.14); }
.btn-reset { background: rgba(255,255,255,0.05); color: #666; border: 1px solid rgba(255,255,255,0.08); }
.btn-reset:hover { background: rgba(255,255,255,0.1); color: #999; }
.copied { background: #2E7D32 !important; color: #fff !important; }

.progress {
  font-size: 12px; color: #69727D; display: flex; align-items: center; gap: 8px; margin-left: auto;
}
.progress-bar {
  width: 120px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: #FF0051; border-radius: 3px; transition: width 0.3s ease;
}

/* Summary strip */
.summary {
  display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
}
.summary-tier {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888;
}
.summary-dot {
  width: 10px; height: 10px; border-radius: 3px;
}
.dot-s { background: #FF0051; }
.dot-a { background: #FF6A00; }
.dot-b { background: #1565C0; }
.dot-c { background: #555; }

/* Cards */
.card-list {
  display: flex; flex-direction: column; gap: 8px;
}

.sp-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
}

.sp-card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.18);
}

.sp-card.rated { opacity: 0.5; transform: scale(0.97); }
.sp-card.rated:hover { opacity: 0.7; }

.sp-card.tier-tagged-s { border-left: 3px solid #FF0051; }
.sp-card.tier-tagged-a { border-left: 3px solid #FF6A00; }
.sp-card.tier-tagged-b { border-left: 3px solid #1565C0; }
.sp-card.tier-tagged-c { border-left: 3px solid #555; }

.sp-num {
  font-size: 11px; font-weight: 700; color: #555; min-width: 22px;
}

.sp-content { flex: 1; }

.sp-name { font-size: 13px; font-weight: 600; color: #e0e0e0; line-height: 1.4; }
.sp-proof { font-size: 10px; color: #777; margin-top: 2px; line-height: 1.4; }

.sp-cat {
  font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 50px;
  white-space: nowrap; margin-top: 4px; display: inline-block;
}
.cat-fx { background: rgba(255,0,81,0.15); color: #FF6B8A; }
.cat-1688 { background: rgba(255,106,0,0.15); color: #FFB366; }
.cat-speed { background: rgba(21,101,192,0.15); color: #64B5F6; }
.cat-network { background: rgba(123,47,190,0.15); color: #CE93D8; }
.cat-safety { background: rgba(46,125,50,0.15); color: #81C784; }
.cat-cost { background: rgba(255,193,7,0.15); color: #FFD54F; }
.cat-ops { background: rgba(0,150,136,0.15); color: #80CBC4; }
.cat-corridor { background: rgba(233,30,99,0.15); color: #F48FB1; }
.cat-authority { background: rgba(158,158,158,0.15); color: #BDBDBD; }

/* Tier buttons on each card */
.tier-btns {
  display: flex; gap: 4px; flex-shrink: 0;
}

.tier-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: #888; font-size: 12px; font-weight: 700;
  font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.tier-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

.tier-btn.active-s { background: #FF0051; border-color: #FF0051; color: #fff; }
.tier-btn.active-a { background: #FF6A00; border-color: #FF6A00; color: #fff; }
.tier-btn.active-b { background: #1565C0; border-color: #1565C0; color: #fff; }
.tier-btn.active-c { background: #555; border-color: #555; color: #fff; }

.tier-btn.active-s:hover { background: #E0004A; }
.tier-btn.active-a:hover { background: #E05D00; }
.tier-btn.active-b:hover { background: #0D47A1; }
.tier-btn.active-c:hover { background: #444; }

/* Filter tabs */
.filter-tabs {
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
}
.filter-tab {
  padding: 6px 14px; font-size: 11px; font-weight: 600;
  font-family: 'Poppins', sans-serif; border-radius: 50px; cursor: pointer;
  background: rgba(255,255,255,0.05); color: #777; border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.15s;
}
.filter-tab:hover { background: rgba(255,255,255,0.1); color: #ccc; }
.filter-tab.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.25); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #2E7D32; color: #fff; padding: 12px 24px;
  border-radius: 50px; font-size: 13px; font-weight: 600;
  transition: transform 0.3s ease; z-index: 100;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<h1>WF Selling Points — Tier List</h1>
<p class="subtitle">Tap S / A / B / C on each card to rate it. Click "Copy for Claude" when done.</p>

<div class="controls">
  <button class="btn btn-primary" id="copyBtn" onclick="copyResult()">Copy for Claude</button>
  <button class="btn btn-secondary" onclick="autoRank()">Auto-rank</button>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>
  <div class="progress">
    <span id="progressText">0 / 44 rated</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="summary" id="summary">
  <div class="summary-tier"><span class="summary-dot dot-s"></span> S: <strong id="sum-s">0</strong></div>
  <div class="summary-tier"><span class="summary-dot dot-a"></span> A: <strong id="sum-a">0</strong></div>
  <div class="summary-tier"><span class="summary-dot dot-b"></span> B: <strong id="sum-b">0</strong></div>
  <div class="summary-tier"><span class="summary-dot dot-c"></span> C: <strong id="sum-c">0</strong></div>
  <div class="summary-tier" style="color:#555">Unrated: <strong id="sum-none">44</strong></div>
</div>

<div class="filter-tabs" id="filterTabs">
  <div class="filter-tab active" data-filter="all">All (44)</div>
  <div class="filter-tab" data-filter="unrated">Unrated</div>
  <div class="filter-tab" data-filter="s">S-Tier</div>
  <div class="filter-tab" data-filter="a">A-Tier</div>
  <div class="filter-tab" data-filter="b">B-Tier</div>
  <div class="filter-tab" data-filter="c">C-Tier</div>
</div>

<div class="card-list" id="cardList"></div>

<div class="toast" id="toast">Copied to clipboard</div>

<script>
const sellingPoints = [
  { id: 1, name: "Hidden 3-5% bank FX markup on every payment", proof: "Universal pain. Most importers don't know.", cat: "fx" },
  { id: 2, name: "2-4% better rates than banks", proof: "Core product pitch. Easy to calculate savings.", cat: "fx" },
  { id: 3, name: "Rate you see = rate you get (no hidden deductions)", proof: "Transparency as differentiator.", cat: "fx" },
  { id: 4, name: "Double conversion (GBP→USD→CNY / AUD→USD→CNY on Alibaba)", proof: "UK/AU buyers hit twice. Region-specific killer.", cat: "fx" },
  { id: 5, name: "Banks don't itemise FX cost — buried in the rate", proof: "Education angle. Makes hidden markup visible.", cat: "fx" },
  { id: 6, name: "1688 World Pay — 0.4% vs 3% credit card", proof: "Specific. Quantified. Only WF offers this.", cat: "1688" },
  { id: 7, name: "1688 = 20-40% cheaper than Alibaba (same factories)", proof: "Biggest shock value. Concrete number.", cat: "1688" },
  { id: 8, name: "No Chinese bank account needed for 1688", proof: "Removes #1 blocker for 1688 access.", cat: "1688" },
  { id: 9, name: "AI Sourcing Agent — search 1688 in English", proof: "Removes language barrier.", cat: "1688" },
  { id: 10, name: "Official payment partner of 1688.com", proof: "Authority. Defensible. Exclusive.", cat: "1688" },
  { id: 11, name: "No sourcing agent needed for payments", proof: "Saves 5-15% agent fee.", cat: "1688" },
  { id: 12, name: "80% same-day settlement", proof: "Data-backed. Banks take 7-10 days.", cat: "speed" },
  { id: 13, name: "90% within 24 hours", proof: "Supports same-day claim.", cat: "speed" },
  { id: 14, name: "Instant between WF accounts", proof: "Conditional on supplier having WF.", cat: "speed" },
  { id: 15, name: "No more WeChat chasing — instant confirmation", proof: "Emotional pain point. Every direct sourcer has lived this.", cat: "speed" },
  { id: 16, name: "150,000+ verified Chinese suppliers on network", proof: "Network effect. 'Your supplier is probably here.'", cat: "network" },
  { id: 17, name: "1.5M+ businesses on the platform", proof: "Social proof number.", cat: "network" },
  { id: 18, name: "200+ countries & regions", proof: "Scale stat.", cat: "network" },
  { id: 19, name: "20+ currencies supported", proof: "Feature breadth.", cat: "network" },
  { id: 20, name: "Part of Ant International (Asia's largest payment network)", proof: "Credibility. Explains why it's fast.", cat: "network" },
  { id: 21, name: "Business license verification before payment", proof: "Addresses #1 fear (fraud). Free.", cat: "safety" },
  { id: 22, name: "Export license verification before payment", proof: "Compliance angle for serious importers.", cat: "safety" },
  { id: 23, name: "Beneficiary account checked against registration", proof: "Technical detail of verification.", cat: "safety" },
  { id: 24, name: "WorldTrade escrow (off-platform buyer protection)", proof: "The reason people stay on Alibaba. Removes it.", cat: "safety" },
  { id: 25, name: "Licensed & regulated financial institution", proof: "Table stakes. Every competitor claims this.", cat: "safety" },
  { id: 26, name: "Zero transfer fees between WF accounts", proof: "Conditional on supplier. Stacks with network.", cat: "cost" },
  { id: 27, name: "No monthly fees", proof: "Objection remover.", cat: "cost" },
  { id: 28, name: "No minimum balance", proof: "Objection remover.", cat: "cost" },
  { id: 29, name: "Free to open account", proof: "Low-friction CTA.", cat: "cost" },
  { id: 30, name: "Lock in rate today, pay later (forward contracts)", proof: "Working capital management.", cat: "fx" },
  { id: 31, name: "Forward contracts for 3-12 months", proof: "Extension. High-volume importers.", cat: "fx" },
  { id: 32, name: "See exact cost in your currency before sending", proof: "UX advantage. No surprises.", cat: "fx" },
  { id: 33, name: "Money moves via local rails, not SWIFT", proof: "Explains WHY payments are fast.", cat: "ops" },
  { id: 34, name: "Send to any Chinese bank account, Alipay, or WeChat Pay", proof: "Flexibility. All supplier methods.", cat: "ops" },
  { id: 35, name: "One account: receive marketplace payouts + pay suppliers", proof: "Marketplace sellers who also source.", cat: "ops" },
  { id: 36, name: "Hold, receive, send from one multi-currency account", proof: "Platform capability.", cat: "ops" },
  { id: 37, name: "GBP→CNY direct (skip USD middle step)", proof: "UK-specific. Powerful for that corridor.", cat: "corridor" },
  { id: 38, name: "AUD→CNY direct (big four banks worst markup)", proof: "AU-specific. Highest impact corridor.", cat: "corridor" },
  { id: 39, name: "EUR→CNY direct (skip SEPA→SWIFT)", proof: "EU-specific.", cat: "corridor" },
  { id: 40, name: "CNH (offshore yuan) support", proof: "Niche. Treasury teams only.", cat: "corridor" },
  { id: 41, name: "MYbank routing for domestic CNY settlement", proof: "Too technical. Plumbing detail.", cat: "corridor" },
  { id: 42, name: "Established since 2004", proof: "Trust signal but generic.", cat: "authority" },
  { id: 43, name: "Proprietary transaction data on China corridor", proof: "Authority. Content play, not email.", cat: "authority" },
  { id: 44, name: "Real FX rates from actual transactions", proof: "Content marketing angle.", cat: "authority" },
];

const catLabels = {
  fx: "FX & Pricing", "1688": "1688", speed: "Speed",
  network: "Network & Scale", safety: "Safety & Verification",
  cost: "Cost Structure", ops: "Operational", corridor: "Corridor-Specific",
  authority: "Authority"
};

const autoTiers = {
  s: [7, 1, 6, 4, 12, 21],
  a: [2, 15, 24, 16, 9, 8, 3],
  b: [14, 13, 26, 5, 22, 32, 30, 34, 10, 35, 38, 37],
  c: [20, 27, 28, 29, 17, 23, 33, 25, 11, 36, 39, 31, 42, 43, 44, 18, 19, 40, 41]
};

// State
const ratings = {}; // id -> 's'|'a'|'b'|'c'|null
let currentFilter = 'all';

function render() {
  const list = document.getElementById('cardList');
  list.innerHTML = '';

  sellingPoints.forEach(sp => {
    const tier = ratings[sp.id] || null;

    // Filter
    if (currentFilter === 'unrated' && tier) return;
    if (['s','a','b','c'].includes(currentFilter) && tier !== currentFilter) return;

    const card = document.createElement('div');
    card.className = 'sp-card';
    if (tier) card.classList.add('rated', `tier-tagged-${tier}`);
    card.dataset.id = sp.id;

    card.innerHTML = `
      <span class="sp-num">${sp.id}</span>
      <div class="sp-content">
        <div class="sp-name">${sp.name}</div>
        <div class="sp-proof">${sp.proof}</div>
        <span class="sp-cat cat-${sp.cat}">${catLabels[sp.cat]}</span>
      </div>
      <div class="tier-btns">
        <button class="tier-btn ${tier==='s'?'active-s':''}" data-tier="s" data-id="${sp.id}">S</button>
        <button class="tier-btn ${tier==='a'?'active-a':''}" data-tier="a" data-id="${sp.id}">A</button>
        <button class="tier-btn ${tier==='b'?'active-b':''}" data-tier="b" data-id="${sp.id}">B</button>
        <button class="tier-btn ${tier==='c'?'active-c':''}" data-tier="c" data-id="${sp.id}">C</button>
      </div>
    `;

    list.appendChild(card);
  });

  // Bind tier button clicks
  document.querySelectorAll('.tier-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = +e.target.dataset.id;
      const tier = e.target.dataset.tier;

      // Toggle: if same tier clicked again, unrate
      if (ratings[id] === tier) {
        delete ratings[id];
      } else {
        ratings[id] = tier;
      }
      render();
    });
  });

  updateStats();
}

function updateStats() {
  const counts = { s: 0, a: 0, b: 0, c: 0, none: 0 };
  sellingPoints.forEach(sp => {
    const t = ratings[sp.id];
    if (t) counts[t]++;
    else counts.none++;
  });

  document.getElementById('sum-s').textContent = counts.s;
  document.getElementById('sum-a').textContent = counts.a;
  document.getElementById('sum-b').textContent = counts.b;
  document.getElementById('sum-c').textContent = counts.c;
  document.getElementById('sum-none').textContent = counts.none;

  const rated = 44 - counts.none;
  document.getElementById('progressText').textContent = `${rated} / 44 rated`;
  document.getElementById('progressFill').style.width = `${(rated / 44) * 100}%`;

  // Update filter tab counts
  const tabs = document.querySelectorAll('.filter-tab');
  tabs.forEach(tab => {
    const f = tab.dataset.filter;
    if (f === 'all') tab.textContent = `All (44)`;
    else if (f === 'unrated') tab.textContent = `Unrated (${counts.none})`;
    else if (f === 's') tab.textContent = `S-Tier (${counts.s})`;
    else if (f === 'a') tab.textContent = `A-Tier (${counts.a})`;
    else if (f === 'b') tab.textContent = `B-Tier (${counts.b})`;
    else if (f === 'c') tab.textContent = `C-Tier (${counts.c})`;
  });
}

// Filter tabs
document.getElementById('filterTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  render();
});

function autoRank() {
  Object.entries(autoTiers).forEach(([tier, ids]) => {
    ids.forEach(id => { ratings[id] = tier; });
  });
  render();
}

function resetAll() {
  Object.keys(ratings).forEach(k => delete ratings[k]);
  currentFilter = 'all';
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  render();
}

function copyResult() {
  const tiers = ['s', 'a', 'b', 'c'];
  const tierLabels = { s: 'S-TIER', a: 'A-TIER', b: 'B-TIER', c: 'C-TIER' };
  let output = "Here's my tier ranking for the 44 WF selling points:\n\n";

  tiers.forEach(tier => {
    const items = sellingPoints.filter(sp => ratings[sp.id] === tier);
    if (items.length === 0) return;
    output += `**${tierLabels[tier]}:**\n`;
    items.forEach((sp, i) => {
      output += `${i + 1}. ${sp.name}\n`;
    });
    output += '\n';
  });

  const unrated = sellingPoints.filter(sp => !ratings[sp.id]);
  if (unrated.length > 0) {
    output += `**UNRANKED (${unrated.length} remaining):**\n`;
    unrated.forEach(sp => {
      output += `- ${sp.name}\n`;
    });
    output += '\n';
  }

  output += "Please rebuild the email matrix using this ranking. S-tier = send first, A-tier = strong standalone, B-tier = segment-specific, C-tier = weave into other emails.";

  navigator.clipboard.writeText(output).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      btn.textContent = 'Copy for Claude';
      btn.classList.remove('copied');
    }, 2000);
  });
}

render();
</script>

</body>
</html>
